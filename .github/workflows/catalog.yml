name: Update Catalog

on:
  release:
    types: [ published ]

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Check catalog token
        id: catalog_check
        run: |
          if [ -n "$CATALOG_PAT" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          CATALOG_PAT: ${{ secrets.CATALOG_PAT }}

      - name: Update catalog
        if: steps.catalog_check.outputs.has_token == 'true'
        env:
          CATALOG_PAT: ${{ secrets.CATALOG_PAT }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          # Find the shadow JAR asset URL from the release
          JAR_NAME=$(echo '${{ toJSON(github.event.release.assets) }}' | jq -r '.[] | select(.name | endswith("-all.jar")) | .name' | head -1)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${JAR_NAME}"

          git clone https://x-access-token:${CATALOG_PAT}@github.com/sceriff0/flowpath-catalog.git /tmp/catalog
          cd /tmp/catalog

          EXTENSION_NAME="FlowPath - qUMAP"

          NEW_RELEASE=$(jq -n --arg name "$TAG" --arg url "$DOWNLOAD_URL" \
            '{name: $name, main_url: $url, version_range: {min: "v0.7.0"}}')

          jq --arg ext "$EXTENSION_NAME" --argjson release "$NEW_RELEASE" \
            '(.extensions[] | select(.name == $ext) | .releases) |= [$release] + .' \
            catalog.json > catalog.tmp && mv catalog.tmp catalog.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git commit -m "Add ${EXTENSION_NAME} ${TAG} to catalog"
          git push
